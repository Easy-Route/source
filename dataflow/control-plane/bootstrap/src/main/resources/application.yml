server:
  port: 8080
  shutdown: graceful

spring:
  application:
    name: dataflow-control-plane
  datasource:
    url: jdbc:postgresql://${DB_HOST:postgres}:${DB_PORT:5432}/${DB_NAME:dataflow}
    username: ${DB_USER:dataflow}
    password: ${DB_PASSWORD:dataflow}
    hikari:
      maximum-pool-size: 16
      minimum-idle: 2
      connection-timeout: 5000
  flyway:
    enabled: true
    locations: classpath:db/migration
  jackson:
    serialization:
      write-dates-as-timestamps: false
    default-property-inclusion: non_null

management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus,metrics
  metrics:
    tags:
      application: ${spring.application.name}
  prometheus:
    metrics:
      export:
        enabled: true

springdoc:
  swagger-ui:
    path: /swagger-ui

dataflow:
  reconciler:
    period: PT10S
    stuck-after: PT10M
    max-attempts: 5
    retry-initial: PT2S
    retry-max: PT60S
    retry-multiplier: 2.0
    retry-jitter: 0.2
  observer:
    flink-probe-interval: PT10S
    connector-probe-interval: PT15S
    topic-probe-interval: PT30S
    sink-probe-interval: PT30S
  kafka:
    bootstrap-servers: ${KAFKA_BOOTSTRAP:kafka:9092}
    security-protocol: PLAINTEXT
    request-timeout-ms: 30000
    default-replication-factor: 1
    default-partitions: 6
    default-retention-ms: 604800000
  connect:
    url: ${CONNECT_URL:http://kafka-connect:8083}
  flink:
    url: ${FLINK_URL:http://flink-jobmanager:8081}
    worker-jar-path: ${FLINK_WORKER_JAR:/opt/flink/usrlib/flink-worker.jar}
    worker-entry-class: org.dataflow.flink.FlinkWorkerJob
    checkpoint-storage: file:///flink-checkpoints
    savepoint-storage: file:///flink-checkpoints
    checkpoint-interval-seconds: 30
    default-parallelism: 2
    task-slots: 4
    config-dir: /opt/flink/conf/tracts
  starrocks:
    user: ${STARROCKS_USER:root}
    password: ${STARROCKS_PASSWORD:}
  security:
    admin:
      user: ${ADMIN_USER:admin}
      password: ${ADMIN_PASSWORD:admin}
    viewer:
      user: ${VIEWER_USER:viewer}
      password: ${VIEWER_PASSWORD:viewer}

logging:
  level:
    root: INFO
    org.dataflow: DEBUG
